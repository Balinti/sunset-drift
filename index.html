<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunset Drift - Free HTML5 Game</title>
<meta name="description" content="Play Sunset Drift - Tap to float your silhouette higher as the horizon zooms in and fireballs rain down.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta property="og:title" content="Sunset Drift">
<meta property="og:description" content="Silhouette phase runner — match the sky color, collect what it wants, dodge the rest.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://balinti.github.io/sunset-drift/preview.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Sunset Drift">
<meta name="twitter:description" content="Silhouette phase runner — match the sky color, collect what it wants, dodge the rest.">
<meta name="theme-color" content="#FF6B35">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4099346100621490" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040008;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
#gc{position:relative;width:100%;max-width:420px;height:100vh;max-height:750px}
canvas{display:block;width:100%;height:100%;touch-action:none;cursor:pointer}
</style>
</head>
<body>
<div id="gc"><canvas id="c"></canvas></div>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const gc = document.getElementById('gc');

let W = 420, H = 750, DPR = 1;
const LANE_Y = [0, 0, 0];
let HORIZON_Y = 0;

function resize() {
  const r = gc.getBoundingClientRect();
  W = r.width || 420;
  H = r.height || 750;
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  LANE_Y[0] = H * 0.33;
  LANE_Y[1] = H * 0.50;
  LANE_Y[2] = H * 0.65;
  HORIZON_Y = H * 0.71;
}
resize();
window.addEventListener('resize', resize);

// ── PHASES ───────────────────────────────────────────────────────────────────
const PHASES = ['AMBER', 'CRIMSON', 'VIOLET'];
const PHASE_SAFE = { AMBER: 'bird', CRIMSON: 'rock', VIOLET: 'water' };
const PHASE_SKY = {
  AMBER:   { stops: [[8,2,0],[45,12,0],[145,55,5],[255,175,55]], horizon: [255,215,75] },
  CRIMSON: { stops: [[28,0,5],[88,0,18],[195,18,42],[255,115,75]], horizon: [255,72,52] },
  VIOLET:  { stops: [[5,0,20],[28,0,68],[105,0,165],[195,115,250]], horizon: [212,145,255] }
};
const OBS_COL = {
  bird:  { safe: [255,212,60],  lethal: [195,78,58] },
  rock:  { safe: [155,218,100], lethal: [108,92,82] },
  water: { safe: [78,218,255],  lethal: [48,82,195] }
};
const PHASE_LABEL = { AMBER: 'COLLECT BIRDS', CRIMSON: 'COLLECT ROCKS', VIOLET: 'COLLECT WAVES' };

// ── STATE ────────────────────────────────────────────────────────────────────
let state = 'start';
let score = 0;
let best = +localStorage.getItem('sd_best') || 0;
let lastTime = 0;

// Sky
let phaseIdx = 0, prevPhaseIdx = 0, phaseLerp = 1;
let phaseTimer = 0;
const BASE_PHASE_DUR = 8000;
let phaseDuration = BASE_PHASE_DUR;
let phaseWarning = false, warnPulse = 0;
let flashAlpha = 0;

// Player
let playerLane = 1, playerY = 0, playerTargetY = 0;
const PX_FRAC = 0.17;

// Obstacles / particles / popups
let obstacles = [], particles = [], popups = [];
let spawnTimer = 0, spawnInterval = 1800, spawnDelay = 1200;

// Shake
let shakeX = 0, shakeY = 0, shakeMag = 0;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpC(c1, c2, t) {
  return [lerp(c1[0],c2[0],t)|0, lerp(c1[1],c2[1],t)|0, lerp(c1[2],c2[2],t)|0];
}
function rgb(c, a) {
  return a !== undefined ? 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')' : 'rgb('+c[0]+','+c[1]+','+c[2]+')';
}
function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// ── INPUT ────────────────────────────────────────────────────────────────────
function onInput() {
  if (state === 'start' || state === 'gameover') { startGame(); return; }
  if (state === 'playing') {
    playerLane = (playerLane + 1) % 3;
    playerTargetY = LANE_Y[playerLane];
    emitTap();
  }
}
canvas.addEventListener('pointerdown', function(e) { e.preventDefault(); onInput(); });
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); onInput(); }
});

// ── GAME CONTROL ─────────────────────────────────────────────────────────────
function startGame() {
  state = 'playing';
  score = 0;
  phaseIdx = 0; prevPhaseIdx = 0; phaseLerp = 1;
  phaseTimer = 0; phaseDuration = BASE_PHASE_DUR;
  phaseWarning = false; warnPulse = 0; flashAlpha = 0;
  obstacles = []; particles = []; popups = [];
  spawnTimer = 0; spawnInterval = 1800; spawnDelay = 1200;
  playerLane = 1;
  playerY = LANE_Y[1]; playerTargetY = LANE_Y[1];
  shakeMag = 0;
}

function endGame() {
  state = 'gameover';
  if (score > best) { best = score; localStorage.setItem('sd_best', best); }
  shakeMag = 22;
  emitDeath();
}

// ── OBSTACLE FACTORY ─────────────────────────────────────────────────────────
function spawnObs() {
  var safeType = PHASE_SAFE[PHASES[phaseIdx]];
  var all = ['bird','rock','water'];
  var lethal = all.filter(function(t) { return t !== safeType; });
  var r = Math.random();
  var type = r < 0.46 ? safeType : lethal[Math.random() < 0.5 ? 0 : 1];
  var lane = Math.floor(Math.random() * 3);
  var spd = 165 + Math.min(score, 80) * 1.3 + Math.random() * 35;
  obstacles.push({
    type: type, lane: lane, x: W + 50, y: LANE_Y[lane], speed: spd,
    angle: 0,
    wave: Math.random() * Math.PI * 2,
    waveSpd: 1.2 + Math.random() * 0.9,
    waveAmp: 7 + Math.random() * 11,
    size: type === 'water' ? 22 : 17,
    dead: false
  });
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
function emit(x, y, col, n, spd, life, grav) {
  if (grav === undefined) grav = 65;
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = spd * (0.4 + Math.random() * 0.9);
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - spd * 0.25,
      grav: grav, life: life, maxLife: life,
      r: col[0], g: col[1], b: col[2],
      sz: 1.5 + Math.random() * 2.5
    });
  }
}

function emitTap() {
  var col = curHorizon();
  emit(W * PX_FRAC, LANE_Y[playerLane], col, 7, 45, 0.32, 15);
}

function emitCollect(x, y, type) {
  var col = OBS_COL[type].safe;
  emit(x, y, col, 16, 95, 0.7);
  for (var i = 0; i < 10; i++) {
    var a = (i / 10) * Math.PI * 2;
    particles.push({
      x: x, y: y, vx: Math.cos(a)*110, vy: Math.sin(a)*110,
      grav: 0, life: 0.38, maxLife: 0.38,
      r: col[0], g: col[1], b: col[2], sz: 2
    });
  }
}

function emitDeath() {
  emit(W * PX_FRAC, playerY, [255,55,40], 38, 130, 1.3);
}

// ── INTERPOLATED SKY HELPERS ─────────────────────────────────────────────────
function curStop(idx) {
  var t = ease(Math.min(phaseLerp, 1));
  if (t >= 1) return PHASE_SKY[PHASES[phaseIdx]].stops[idx];
  return lerpC(PHASE_SKY[PHASES[prevPhaseIdx]].stops[idx], PHASE_SKY[PHASES[phaseIdx]].stops[idx], t);
}
function curHorizon() {
  var t = ease(Math.min(phaseLerp, 1));
  if (t >= 1) return PHASE_SKY[PHASES[phaseIdx]].horizon;
  return lerpC(PHASE_SKY[PHASES[prevPhaseIdx]].horizon, PHASE_SKY[PHASES[phaseIdx]].horizon, t);
}

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  var px = W * PX_FRAC;

  // Player lerp
  playerY += (playerTargetY - playerY) * Math.min(1, dt * 13);

  // Shake
  if (shakeMag > 0.1) {
    shakeX = (Math.random()-0.5)*shakeMag;
    shakeY = (Math.random()-0.5)*shakeMag;
    shakeMag *= 0.84;
  } else { shakeX = 0; shakeY = 0; shakeMag = 0; }

  // Flash
  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 3);

  // Phase timer
  phaseTimer += dt * 1000;
  var timeLeft = phaseDuration - phaseTimer;
  if (!phaseWarning && timeLeft <= 1500) phaseWarning = true;
  if (phaseWarning) warnPulse += dt * 5;

  if (phaseLerp < 1) phaseLerp = Math.min(1, phaseLerp + dt * 2.8);

  if (phaseTimer >= phaseDuration) {
    prevPhaseIdx = phaseIdx;
    phaseIdx = (phaseIdx + 1) % 3;
    phaseLerp = 0;
    phaseTimer = 0;
    phaseDuration = Math.max(4200, BASE_PHASE_DUR - score * 22);
    phaseWarning = false; warnPulse = 0;
    flashAlpha = 0.5;
  }

  // Spawn
  if (spawnDelay > 0) {
    spawnDelay -= dt * 1000;
  } else {
    spawnTimer += dt * 1000;
    spawnInterval = Math.max(620, 1800 - score * 7.5);
    if (spawnTimer >= spawnInterval) {
      spawnTimer -= spawnInterval;
      spawnObs();
      if (score >= 12 && Math.random() < 0.28) spawnObs();
    }
  }

  // Update obstacles
  var safeType = PHASE_SAFE[PHASES[phaseIdx]];
  var PR = 12;

  for (var i = obstacles.length - 1; i >= 0; i--) {
    var o = obstacles[i];
    if (o.dead) { obstacles.splice(i, 1); continue; }

    o.x -= o.speed * dt;
    o.wave += o.waveSpd * dt;
    o.angle += 2.6 * dt;

    var oy = o.y + (o.type === 'bird' ? Math.sin(o.wave) * o.waveAmp : 0);

    var dx = o.x - px;
    var dy = oy - playerY;
    var dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < PR + o.size * 0.72) {
      if (o.type === safeType) {
        score++;
        o.dead = true;
        emitCollect(o.x, oy, o.type);
        popups.push({ x: o.x, y: oy - 18, text: '+1', life: 0.72, maxLife: 0.72 });
      } else {
        endGame();
        return;
      }
    }

    if (o.x < -65) obstacles.splice(i, 1);
  }

  // Particles
  for (var j = particles.length - 1; j >= 0; j--) {
    var p = particles[j];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += p.grav * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(j, 1);
  }

  // Popups
  for (var k = popups.length - 1; k >= 0; k--) {
    var pp = popups[k];
    pp.y -= 38 * dt;
    pp.life -= dt;
    if (pp.life <= 0) popups.splice(k, 1);
  }
}

// ── DRAW: SKY ────────────────────────────────────────────────────────────────
function drawSky() {
  var g = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  g.addColorStop(0.0, rgb(curStop(0)));
  g.addColorStop(0.3, rgb(curStop(1)));
  g.addColorStop(0.65, rgb(curStop(2)));
  g.addColorStop(1.0, rgb(curStop(3)));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, HORIZON_Y + 2);

  // Sun orb
  var hc = curHorizon();
  var sx = W * 0.63, sy = HORIZON_Y * 0.52, sr = 28;
  var glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 4.5);
  glow.addColorStop(0, rgb(hc, 0.38));
  glow.addColorStop(0.35, rgb(hc, 0.12));
  glow.addColorStop(1, rgb(hc, 0));
  ctx.fillStyle = glow;
  ctx.fillRect(sx - sr*4.5, sy - sr*4.5, sr*9, sr*9);
  var disc = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
  disc.addColorStop(0, 'rgb(255,255,222)');
  disc.addColorStop(0.55, rgb(hc));
  disc.addColorStop(1, rgb(hc, 0.25));
  ctx.fillStyle = disc;
  ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();

  // Warning shimmer
  if (phaseWarning) {
    var wa = (Math.sin(warnPulse * 3) * 0.5 + 0.5) * 0.065;
    ctx.fillStyle = 'rgba(255,255,185,'+wa+')';
    ctx.fillRect(0, 0, W, HORIZON_Y + 2);
  }

  // Phase transition flash
  if (flashAlpha > 0) {
    ctx.fillStyle = 'rgba(255,255,255,'+flashAlpha+')';
    ctx.fillRect(0, 0, W, H);
  }
}

// ── DRAW: GROUND ─────────────────────────────────────────────────────────────
function drawGround() {
  var g = ctx.createLinearGradient(0, HORIZON_Y, 0, H);
  g.addColorStop(0, 'rgb(12,4,2)');
  g.addColorStop(1, 'rgb(3,1,5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, HORIZON_Y, W, H - HORIZON_Y);

  // Horizon glow line
  var hc = curHorizon();
  ctx.save();
  ctx.shadowColor = rgb(hc); ctx.shadowBlur = 20;
  ctx.strokeStyle = rgb(hc); ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, HORIZON_Y); ctx.lineTo(W, HORIZON_Y); ctx.stroke();
  ctx.restore();

  // Silhouette hills
  var hx = [0, W*0.07, W*0.16, W*0.28, W*0.4, W*0.53, W*0.66, W*0.78, W*0.9, W];
  var ho = [10, 3, 16, 5, 20, 7, 24, 9, 18, 7];
  ctx.fillStyle = 'rgb(5,2,8)';
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y + ho[0]);
  for (var i = 0; i < hx.length - 1; i++) {
    var mx = (hx[i] + hx[i+1]) / 2;
    var my = (HORIZON_Y + ho[i] + HORIZON_Y + ho[i+1]) / 2;
    ctx.quadraticCurveTo(hx[i], HORIZON_Y + ho[i], mx, my);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();

  // Subtle lane guide tracks
  ctx.save();
  ctx.globalAlpha = 0.055;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.setLineDash([3, 9]);
  for (var j = 0; j < 3; j++) {
    ctx.beginPath();
    ctx.moveTo(W * 0.1, LANE_Y[j]);
    ctx.lineTo(W * 0.86, LANE_Y[j]);
    ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();
}

// ── DRAW: PLAYER ─────────────────────────────────────────────────────────────
function drawPlayer() {
  var px = W * PX_FRAC + shakeX;
  var py = playerY + shakeY;
  var t = Date.now() * 0.0072;

  ctx.save();
  ctx.translate(px, py);

  var fill = '#070006';
  ctx.strokeStyle = fill;
  ctx.lineCap = 'round';

  // Legs (running animation)
  ctx.lineWidth = 3.8;
  ctx.beginPath();
  ctx.moveTo(1, 0);
  ctx.lineTo(Math.cos(t) * 7, 11);
  ctx.lineTo(Math.cos(t) * 7 + Math.cos(t + 0.45) * 6, 20);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(1, 0);
  ctx.lineTo(Math.cos(t + Math.PI) * 7, 11);
  ctx.lineTo(Math.cos(t + Math.PI) * 7 + Math.cos(t + Math.PI + 0.45) * 6, 20);
  ctx.stroke();

  // Arms
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(1, -8); ctx.lineTo(Math.cos(t + Math.PI) * 10 + 1, 2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(1, -8); ctx.lineTo(Math.cos(t) * -9, 2); ctx.stroke();

  // Torso
  ctx.fillStyle = fill;
  ctx.fillRect(-4, -12, 10, 13);

  // Head
  ctx.beginPath(); ctx.arc(2, -17, 5, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── DRAW: OBSTACLES ──────────────────────────────────────────────────────────
function obsActualY(o) {
  return o.y + (o.type === 'bird' ? Math.sin(o.wave) * o.waveAmp : 0);
}

function drawObstacle(o) {
  var ph = PHASES[phaseIdx];
  var isSafe = PHASE_SAFE[ph] === o.type;
  var col = isSafe ? OBS_COL[o.type].safe : OBS_COL[o.type].lethal;
  var oy = obsActualY(o) + shakeY;
  var ox = o.x + shakeX;

  ctx.save();
  ctx.translate(ox, oy);

  if (isSafe) { ctx.shadowColor = rgb(col); ctx.shadowBlur = 14; }

  if (o.type === 'bird') drawBird(o, col);
  else if (o.type === 'rock') drawRock(o, col);
  else drawWater(o, col);

  // Safe glow ring
  if (isSafe) {
    var ra = 0.28 + 0.2 * Math.sin(Date.now() * 0.006);
    ctx.globalAlpha = ra;
    ctx.strokeStyle = rgb(col); ctx.lineWidth = 1.5;
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(0, 0, o.size * 1.45, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawBird(o, col) {
  var s = o.size;
  var flap = Math.sin(Date.now() * 0.033) * 0.42;
  ctx.strokeStyle = rgb(col); ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-s*0.35, -s*flap, -s*0.82, s*0.08 - s*flap*0.28, -s*1.35, -s*0.08);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.bezierCurveTo(s*0.35, -s*flap, s*0.82, s*0.08 - s*flap*0.28, s*1.35, -s*0.08);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-s*0.55, s*0.52); ctx.stroke();
  ctx.fillStyle = rgb(col);
  ctx.beginPath(); ctx.arc(0, 0, 2.8, 0, Math.PI*2); ctx.fill();
}

function drawRock(o, col) {
  var s = o.size;
  ctx.save(); ctx.rotate(o.angle);
  ctx.fillStyle = rgb(col);
  ctx.beginPath();
  for (var i = 0; i < 7; i++) {
    var a = (i / 7) * Math.PI * 2;
    var r = s * (0.62 + 0.38 * Math.sin(i * 2.4 + 0.9));
    if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();
}

function drawWater(o, col) {
  var s = o.size;
  var t = Date.now() * 0.003;
  ctx.strokeStyle = rgb(col); ctx.lineWidth = 2.2; ctx.lineCap = 'round';
  for (var i = -1; i <= 1; i++) {
    var yO = i * 6.5, ph = i * 0.85;
    ctx.beginPath();
    ctx.moveTo(-s*1.3, yO + Math.sin(t+ph)*3);
    ctx.bezierCurveTo(
      -s*0.62, yO - s*0.42 + Math.sin(t*1.4+ph)*5,
       s*0.62, yO + s*0.42 + Math.sin(t*0.9+ph)*5,
       s*1.3, yO + Math.sin(t+ph+1.3)*3
    );
    ctx.stroke();
  }
}

// ── DRAW: PARTICLES ──────────────────────────────────────────────────────────
function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var a = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgb('+p.r+','+p.g+','+p.b+')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.sz * a, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── DRAW: HUD ────────────────────────────────────────────────────────────────
function drawHUD() {
  var hc = curHorizon();
  var ph = PHASES[phaseIdx];

  ctx.textAlign = 'center';
  ctx.font = 'bold ' + Math.round(H*0.056) + 'px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.fillText(score, W/2, H*0.065);

  if (best > 0) {
    ctx.font = Math.round(H*0.024) + 'px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.fillText('BEST ' + best, W/2, H*0.1);
  }

  ctx.save();
  ctx.shadowColor = rgb(hc); ctx.shadowBlur = 10;
  ctx.fillStyle = rgb(hc);
  ctx.font = 'bold ' + Math.round(H*0.024) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(PHASE_LABEL[ph], W/2, H*0.132);
  ctx.restore();

  // Phase timer bar
  var bw = W * 0.46, bx = (W-bw)/2, by = H*0.146, bh = 3;
  var pct = Math.max(0, 1 - phaseTimer / phaseDuration);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.save();
  ctx.shadowColor = rgb(hc); ctx.shadowBlur = 6;
  ctx.fillStyle = rgb(hc);
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.restore();

  // Lane indicators (right)
  for (var i = 0; i < 3; i++) {
    var active = i === playerLane;
    ctx.beginPath();
    ctx.arc(W - 17, LANE_Y[i], active ? 5.5 : 3, 0, Math.PI*2);
    ctx.fillStyle = active ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.22)';
    ctx.fill();
  }

  // Warning text
  if (phaseWarning) {
    var wa = (Math.sin(warnPulse * 3) * 0.5 + 0.5) * 0.82;
    ctx.globalAlpha = wa;
    ctx.fillStyle = 'rgb(255,255,192)';
    ctx.font = Math.round(H*0.02) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PHASE SHIFT', W/2, H*0.164);
    ctx.globalAlpha = 1;
  }

  // Score popups
  ctx.textAlign = 'center';
  ctx.font = 'bold ' + Math.round(H*0.038) + 'px monospace';
  for (var k = 0; k < popups.length; k++) {
    var pp = popups[k];
    ctx.globalAlpha = pp.life / pp.maxLife;
    ctx.fillStyle = '#fff';
    ctx.fillText(pp.text, pp.x, pp.y);
  }
  ctx.globalAlpha = 1;
}

// ── DRAW: SCREENS ─────────────────────────────────────────────────────────────
function drawStart() {
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, W, H);

  var pulse = Math.sin(Date.now() * 0.0024) * 0.5 + 0.5;
  var hc = PHASE_SKY.AMBER.horizon;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = rgb(hc); ctx.shadowBlur = 22;
  ctx.fillStyle = 'rgb(255,185,72)';
  ctx.font = '900 ' + Math.round(H*0.095) + 'px serif';
  ctx.fillText('SUNSET', W/2, H*0.35);
  ctx.fillStyle = 'rgb(255,215,90)';
  ctx.font = '900 ' + Math.round(H*0.085) + 'px serif';
  ctx.fillText('DRIFT', W/2, H*0.44);
  ctx.restore();

  ctx.fillStyle = 'rgba(255,205,128,0.72)';
  ctx.font = Math.round(H*0.025) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SILHOUETTE PHASE RUNNER', W/2, H*0.52);

  var legends = [
    { col: PHASE_SKY.AMBER.horizon,   text: 'AMBER  \u2192  COLLECT BIRDS' },
    { col: PHASE_SKY.CRIMSON.horizon, text: 'CRIMSON \u2192 COLLECT ROCKS' },
    { col: PHASE_SKY.VIOLET.horizon,  text: 'VIOLET  \u2192  COLLECT WAVES' }
  ];
  ctx.font = Math.round(H*0.0205) + 'px monospace';
  for (var i = 0; i < legends.length; i++) {
    ctx.fillStyle = rgb(legends[i].col, 0.82);
    ctx.fillText(legends[i].text, W/2, H*0.59 + i * H*0.042);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = Math.round(H*0.021) + 'px monospace';
  ctx.fillText('TAP = shift lane (wraps top to bottom)', W/2, H*0.735);

  ctx.save();
  ctx.globalAlpha = 0.5 + 0.5 * pulse;
  ctx.fillStyle = 'rgb(255,185,72)';
  ctx.font = 'bold ' + Math.round(H*0.038) + 'px monospace';
  ctx.fillText('TAP TO START', W/2, H*0.835);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FF4040'; ctx.shadowBlur = 28;
  ctx.fillStyle = '#FF6565';
  ctx.font = 'bold ' + Math.round(H*0.065) + 'px serif';
  ctx.fillText('FADED', W/2, H*0.37);
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = 'bold ' + Math.round(H*0.095) + 'px monospace';
  ctx.fillText(score, W/2, H*0.495);

  if (score > 0 && score >= best) {
    ctx.save();
    ctx.shadowColor = rgb(PHASE_SKY.AMBER.horizon); ctx.shadowBlur = 12;
    ctx.fillStyle = rgb(PHASE_SKY.AMBER.horizon, 0.92);
    ctx.font = 'bold ' + Math.round(H*0.03) + 'px monospace';
    ctx.fillText('NEW BEST!', W/2, H*0.575);
    ctx.restore();
  } else if (best > 0) {
    ctx.fillStyle = 'rgba(255,175,72,0.68)';
    ctx.font = Math.round(H*0.028) + 'px monospace';
    ctx.fillText('BEST: ' + best, W/2, H*0.575);
  }

  var a = 0.5 + 0.5 * Math.sin(Date.now() * 0.0045);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = 'rgb(255,185,72)';
  ctx.font = 'bold ' + Math.round(H*0.037) + 'px monospace';
  ctx.fillText('TAP TO RETRY', W/2, H*0.71);
  ctx.restore();
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawGround();

  if (state !== 'start') {
    for (var i = 0; i < obstacles.length; i++) drawObstacle(obstacles[i]);
    drawPlayer();
    drawParticles();
    drawHUD();
  }

  if (state === 'start') drawStart();
  if (state === 'gameover') drawGameOver();

  requestAnimationFrame(frame);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
playerY = LANE_Y[1]; playerTargetY = LANE_Y[1];
requestAnimationFrame(function(ts) { lastTime = ts; requestAnimationFrame(frame); });
</script>
</body>
